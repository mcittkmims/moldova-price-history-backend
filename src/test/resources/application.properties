spring.datasource.url=jdbc:h2:mem:pricehistory;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.main.allow-bean-definition-overriding=true
price-history.cors.allowed-origins=http://localhost:5173
price-history.scraper.base-url=http://localhost:8000
price-history.scraper.api-key=test-key
price-history.scraper.connect-timeout=5s
price-history.scraper.read-timeout=5s
