price-history.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:3000,http://10.*.*.*:3000,http://localhost:5173,http://127.0.0.1:5173}
price-history.scraper.base-url=${SCRAPER_BASE_URL:http://localhost:8000}
price-history.scraper.api-key=${SCRAPER_API_KEY:local-dev-key}
price-history.tracking.refresh-interval=${TRACKING_REFRESH_INTERVAL:PT12H}
price-history.auth-secret=${JWT_SECRET:local-demo-secret-local-demo-secret-1234}
price-history.auth-expiration=${JWT_EXPIRATION:1m}
price-history.auth-cookie-name=${JWT_COOKIE_NAME:pricehistory_access}
price-history.auth-cookie-secure=${JWT_COOKIE_SECURE:false}
price-history.auth-cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:pricehistory;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=false
spring.sql.init.mode=always
