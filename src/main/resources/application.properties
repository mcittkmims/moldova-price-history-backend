server.port=${PORT:8080}
spring.application.name=moldova-price-history-backend
spring.profiles.default=local
logging.level.root=info
management.endpoints.web.exposure.include=health,info
price-history.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:3000,http://10.*.*.*:3000,http://localhost:5173,http://127.0.0.1:5173}
price-history.scraper.base-url=${SCRAPER_BASE_URL:http://localhost:8000}
price-history.scraper.api-key=${SCRAPER_API_KEY:}
price-history.scraper.connect-timeout=${SCRAPER_CONNECT_TIMEOUT:5s}
price-history.scraper.read-timeout=${SCRAPER_READ_TIMEOUT:30s}
price-history.tracking.refresh-interval=${TRACKING_REFRESH_INTERVAL:PT12H}
price-history.auth-expiration=${JWT_EXPIRATION:15m}
price-history.auth-cookie-name=${JWT_COOKIE_NAME:pricehistory_access}
price-history.auth-cookie-secure=${JWT_COOKIE_SECURE:false}
price-history.auth-cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pricehistory}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
